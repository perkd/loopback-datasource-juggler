approvedGitRepositories:
  - "https://github.com/perkd/*"

enableGlobalCache: true

enableScripts: true

nodeLinker: node-modules

npmMinimalAgeGate: 0

npmScopes:
  perkd:
    npmAuthToken: "${GITHUB_PAT}"
